# 1. Build the docker image
- name: 'gcr.io/cloud-builders/docker'
args: ['build', '-t', 'us-central1-docker.pkg.dev/cts13-veerasundari/my-app-repo/my-app:$SHORT_SHA', '.']

# 2. Push the image to artifact registry
- name: 'gcr.io/cloud-builders/docker'
args: ['push', 'us-central1-docker.pkg.dev/cts13-veerasundari/my-app-repo/my-app:$SHORT_SHA', '.']

# 3. Deploy to cloud run
-name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
entrypoint: gcloud
args:
- 'run'
- 'deploy'
- 'my-serverless-web-app'
- '--image'
- 'us-central1-docker.pkg.dev/cts13-veerasundari/my-app-repo/my-app:$SHORT_SHA'
- '--region'
- 'us-central1'
- 'allow-unauthenticated'

images:
- 'us-central1-docker.pkg.dev/cts-veerasundari/my-app-repo/my-app:$SHORT_SHA'
